<!DOCTYPE html>
<html>
  <head>
    <title>MCGI Leaflet Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      .editable-text {
        position: absolute;
        font-weight: 700;
        font-family: Montserrat, sans-serif;
        color: #1f6bcedc;
        background: transparent;
        outline: none;
        white-space: nowrap;
        cursor: text;
      }

      #controls {
        margin: 20px 0;
        font-family: sans-serif;
      }

      #controls label {
        margin-right: 5px;
      }

      #controls input,
      #controls select {
        margin-right: 20px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <label>Font Size:</label>
      <input type="range" id="fontSize" min="20" max="120" value="57" />

      <label>Alignment:</label>
      <select id="textAlign">
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option>
      </select>

      <label>Width:</label>
      <input type="range" id="textWidth" min="200" max="1000" value="500" />
      <button onclick="downloadImage()">Download</button>
    </div>

    <div
      id="capture"
      style="
        position: relative;
        width: 3000px;
        height: 2000px;
        background-image: url('MI_Template2026.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      "
    >
      <!-- Editable Text 1 -->
      <div
        contenteditable="true"
        class="editable-text"
        style="top: 491px; left: 649px; font-size: 57px"
      >
        JANUARY 1, 2026
      </div>

      <!-- Editable Text 2 -->
      <div
        contenteditable="true"
        class="editable-text"
        style="top: 496px; left: 2159px; font-size: 57px"
      >
        JANUARY 1, 2026
      </div>
    </div>

    <br />

    <script>
      // Select all editable text elements
      const texts = document.querySelectorAll(".editable-text");
      let selectedText = null;

      // Click to select a text element
      texts.forEach((el) => {
        el.addEventListener("click", () => {
          selectedText = el;
        });
      });

      // Font size control
      document
        .getElementById("fontSize")
        .addEventListener("input", function () {
          if (selectedText) selectedText.style.fontSize = this.value + "px";
        });

      // Text alignment control
      document
        .getElementById("textAlign")
        .addEventListener("change", function () {
          if (selectedText) selectedText.style.textAlign = this.value;
        });

      // Width control (wrap text)
      document
        .getElementById("textWidth")
        .addEventListener("input", function () {
          if (selectedText) {
            selectedText.style.width = this.value + "px";
            selectedText.style.whiteSpace = "normal";
          }
        });

      // Download image
      function downloadImage() {
        const element = document.getElementById("capture");
        html2canvas(element, { useCORS: true, scale: 2 }).then((canvas) => {
          const link = document.createElement("a");
          link.download = "MCGI_leaflet.png";
          link.href = canvas.toDataURL();
          link.click();
        });
      }
    </script>
  </body>
</html>
